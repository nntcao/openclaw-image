/var/log/openclaw/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 openclaw openclaw
    sharedscripts
    postrotate
        supervisorctl signal HUP openclaw telegram 2>/dev/null || true
    endscript
}

/var/log/caddy/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 root root
    postrotate
        caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
    endscript
}

/var/log/supervisor/*.log {
    weekly
    missingok
    rotate 4
    compress
    notifempty
}
