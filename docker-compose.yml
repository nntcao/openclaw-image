services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-443}:443"         # Caddy HTTPS
      - "${HTTP_PORT:-80}:80"            # Caddy HTTP (redirect)
      - "${OPENCLAW_PORT:-3000}:3000"    # OpenClaw API (direct, if no Caddy)
      - "${SSH_PORT:-2222}:22"           # SSH access
      - "${OPIK_PORT:-5173}:5173"        # Opik tracing UI
    volumes:
      # Persistent data
      - openclaw-memory:/data/memory
      - openclaw-sessions:/data/sessions
      - openclaw-traces:/data/traces
      - openclaw-sqlite:/data/sqlite
      - openclaw-backups:/data/backups
      - openclaw-caddy:/data/caddy
      - openclaw-tailscale:/data/tailscale
      - openclaw-workspace:/home/openclaw/.openclaw/workspace
      # SSH keys (mount your authorized_keys / hardware key config)
      - ${SSH_KEYS_PATH:-./ssh}:/home/openclaw/.ssh:ro
      # Optional: mount your own config overrides
      - ${CONFIG_OVERRIDE_PATH:-./config}:/home/openclaw/.openclaw/config-override:ro
    environment:
      # --- Core ---
      - OPENCLAW_API_URL=${OPENCLAW_API_URL:-http://localhost:3000}
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-info}

      # --- Anthropic ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # --- Telegram ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}

      # --- Plugins ---
      - LCM_ENABLED=${LCM_ENABLED:-true}
      - LCM_CONTEXT_THRESHOLD=${LCM_CONTEXT_THRESHOLD:-0.75}
      - LCM_FRESH_TAIL_COUNT=${LCM_FRESH_TAIL_COUNT:-32}
      - LCM_DB_PATH=/data/sqlite/lcm.db
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY:-}
      - HYPERSPELL_API_KEY=${HYPERSPELL_API_KEY:-}
      - AZURE_AI_FOUNDRY_KEY=${AZURE_AI_FOUNDRY_KEY:-}
      - AZURE_AI_FOUNDRY_ENDPOINT=${AZURE_AI_FOUNDRY_ENDPOINT:-}
      - OPIK_API_KEY=${OPIK_API_KEY:-}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE:-default}
      - OPIK_PROJECT_NAME=${OPIK_PROJECT_NAME:-openclaw}
      - OPIK_SELF_HOSTED=${OPIK_SELF_HOSTED:-true}
      - OPIK_BASE_URL=${OPIK_BASE_URL:-http://localhost:5173}

      # --- SSH / Security ---
      - SSH_ENABLE=${SSH_ENABLE:-true}
      - FIDO2_ENABLE=${FIDO2_ENABLE:-false}

      # --- Caddy (reverse proxy / HTTPS) ---
      - CADDY_ENABLE=${CADDY_ENABLE:-false}
      - DOMAIN=${DOMAIN:-}
      - ACME_EMAIL=${ACME_EMAIL:-}

      # --- Tailscale (zero-trust VPN) ---
      - TAILSCALE_AUTHKEY=${TAILSCALE_AUTHKEY:-}
      - TAILSCALE_HOSTNAME=${TAILSCALE_HOSTNAME:-openclaw}

      # --- Timezone ---
      - TZ=${TZ:-UTC}

      # --- Email (Gmail) ---
      - GMAIL_ADDRESS=${GMAIL_ADDRESS:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}

      # --- Backup ---
      - BACKUP_REMOTE=${BACKUP_REMOTE:-}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_NOTIFY=${BACKUP_NOTIFY:-false}

      # --- Memory ---
      - MEMORY_BACKEND=${MEMORY_BACKEND:-hyperspell}
      - MEMORY_PERSIST_PATH=/data/memory
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN        # Required for Tailscale
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    # Hardware security keys / TPM - uncomment if using
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
    #   - /dev/tpm0:/dev/tpm0
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  openclaw-memory:
  openclaw-sessions:
  openclaw-traces:
  openclaw-sqlite:
  openclaw-backups:
  openclaw-caddy:
  openclaw-tailscale:
  openclaw-workspace:
